<!DOCTYPE html>
<html>
<body>

<button id="login">Login with Google yo</button>

<script type="module">
  console.log("Script started");

  import { Web3Auth } from "https://unpkg.com/@web3auth/modal@latest/dist/modal.esm.js";

  console.log("Import loaded");

  const web3auth = new Web3Auth({
    clientId: "BEc5hIVJBZNTtKzNJ04Lhnq88lYTQlbs2wUhBf10eHr4vpY1SHQnajAON9Rl5dzvqat43GIYcgUt4KN1xJ0GLW8",
    web3AuthNetwork: "sapphire_devnet",
  });

  console.log("Web3Auth instance created");

  await web3auth.initModal();

  console.log("Modal initialized");

  document.getElementById("login").addEventListener("click", async () => {
    console.log("Button clicked");
    try {
      await web3auth.connect();
      console.log("Connected");
    } catch (e) {
      console.error("Error:", e);
    }
  });
</script>

</body>
</html>
