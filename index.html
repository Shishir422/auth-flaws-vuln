<!DOCTYPE html>
<html>
<head>
  <title>Web3Auth Test</title>
</head>
<body>
  <button id="login">Login with Google</button>

  <script src="https://cdn.jsdelivr.net/npm/@web3auth/modal"></script>

  <script>
    const web3auth = new window.Web3Auth({
      clientId: "BEc5hIVJBZNTtKzNJ04Lhnq88lYTQlbs2wUhBf10eHr4vpY1SHQnajAON9Rl5dzvqat43GIYcgUt4KN1xJ0GLW8",
      web3AuthNetwork: "sapphire_devnet",
    });

    async function init() {
      await web3auth.initModal();
    }

    init();

    document.getElementById("login").onclick = async () => {
      const provider = await web3auth.connect();
      console.log("Connected:", provider);
    };
  </script>
</body>
</html>
